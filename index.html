<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIST Master's Research Email Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .kaist-blue {
            background-color: #004098;
        }
        .kaist-text {
            color: #004098;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #004098;
            width: 16px;
            height: 16px;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Custom Scrollbar for Queue */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [googleClientId, setGoogleClientId] = useState(localStorage.getItem('kaist_google_client_id') || '');
            const [geminiApiKey, setGeminiApiKey] = useState(localStorage.getItem('kaist_gemini_api_key') || '');
            const [showSettings, setShowSettings] = useState(false);
            
            const [tempClientId, setTempClientId] = useState(googleClientId);
            const [tempGeminiKey, setTempGeminiKey] = useState(geminiApiKey);

            const [userProfile, setUserProfile] = useState(() => {
                const saved = localStorage.getItem('kaist_user_profile');
                return saved ? JSON.parse(saved) : { yourName: '', yourBackground: '' };
            });
            // File attachment state (not saved to local storage due to size limits)
            const [globalAttachments, setGlobalAttachments] = useState([]); 

            const [professors, setProfessors] = useState([]);
            const [profForm, setProfForm] = useState({
                profName: '',
                profEmail: '',
                researchArea: '',
                customPrompt: ''
            });

            const [notification, setNotification] = useState(null);
            
            const [accessToken, setAccessToken] = useState(null);
            const [tokenClient, setTokenClient] = useState(null);

            useEffect(() => {
                localStorage.setItem('kaist_user_profile', JSON.stringify(userProfile));
            }, [userProfile]);

            useEffect(() => {
                if (!googleClientId) return;

                const initGSI = () => {
                    if (window.google && window.google.accounts) {
                        const client = window.google.accounts.oauth2.initTokenClient({
                            client_id: googleClientId,
                            scope: 'https://www.googleapis.com/auth/gmail.send',
                            callback: (response) => {
                                if (response.error) {
                                    showNotification('Failed to authenticate with Google: ' + response.error, 'error');
                                    return;
                                }
                                setAccessToken(response.access_token);
                                showNotification('Successfully connected to Gmail!', 'success');
                            },
                        });
                        setTokenClient(client);
                    } else {
                        setTimeout(initGSI, 500);
                    }
                };
                initGSI();
            }, [googleClientId]);

            const saveSettings = () => {
                localStorage.setItem('kaist_google_client_id', tempClientId.trim());
                localStorage.setItem('kaist_gemini_api_key', tempGeminiKey.trim());
                
                setGoogleClientId(tempClientId.trim());
                setGeminiApiKey(tempGeminiKey.trim());
                setShowSettings(false);
                showNotification('Security settings saved locally.', 'success');
                
                if (accessToken && tempClientId.trim() !== googleClientId) {
                    handleGmailLogout();
                }
            };

            const handleGmailLogin = () => {
                if (!googleClientId) {
                    setShowSettings(true);
                    showNotification("Please configure your Google Client ID first.", "error");
                    return;
                }
                if (tokenClient) {
                    tokenClient.requestAccessToken({ prompt: 'consent' });
                }
            };

            const handleGmailLogout = () => {
                if (accessToken && window.google) {
                    window.google.accounts.oauth2.revoke(accessToken, () => {
                        setAccessToken(null);
                        showNotification('Disconnected from Gmail.', 'success');
                    });
                } else {
                    setAccessToken(null);
                }
            };

            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                
                let hasError = false;

                files.forEach(file => {
                    if (file.size > 5 * 1024 * 1024) {
                        showNotification(`File "${file.name}" is too large. Please keep individual attachments under 5MB.`, "error");
                        hasError = true;
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const base64String = event.target.result.split(',')[1];
                        setGlobalAttachments(prev => [...prev, {
                            id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
                            name: file.name,
                            type: file.type || 'application/octet-stream',
                            data: base64String
                        }]);
                    };
                    reader.onerror = () => {
                        showNotification(`Failed to read file: ${file.name}`, "error");
                    };
                    reader.readAsDataURL(file);
                });

                if (!hasError) {
                    showNotification("Attachment(s) loaded successfully.", "success");
                }
                
                // Reset input so the same file can be uploaded again if removed
                e.target.value = '';
            };

            const removeAttachment = (id) => {
                setGlobalAttachments(prev => prev.filter(att => att.id !== id));
            };

            const handleProfileChange = (e) => {
                const { name, value } = e.target;
                setUserProfile(prev => ({ ...prev, [name]: value }));
            };

            const handleProfFormChange = (e) => {
                const { name, value } = e.target;
                setProfForm(prev => ({ ...prev, [name]: value }));
            };

            const handleAddProfessor = (e) => {
                e.preventDefault();
                if (!profForm.profName || !profForm.profEmail) return;
                
                const newProf = {
                    ...profForm,
                    id: Date.now().toString(),
                    status: 'pending', // pending, generating, drafted, sending, sent, error
                    subject: '',
                    body: '',
                    error: null
                };
                
                setProfessors(prev => [newProf, ...prev]);
                setProfForm({ profName: '', profEmail: '', researchArea: '', customPrompt: '' });
                showNotification("Professor added to the queue.", "success");
            };

            const removeProfessor = (id) => {
                setProfessors(prev => prev.filter(p => p.id !== id));
            };

            const updateProfessorItem = (id, field, value) => {
                setProfessors(prev => prev.map(p => p.id === id ? { ...p, [field]: value } : p));
            };

            const generateSingleDraft = async (profId) => {
                if (!geminiApiKey) {
                    showNotification("Please configure your Gemini API Key in Settings.", "error");
                    setShowSettings(true);
                    return false;
                }
                
                if (!userProfile.yourName || !userProfile.yourBackground) {
                    showNotification("Please fill out Your Profile first.", "error");
                    return false;
                }

                const prof = professors.find(p => p.id === profId);
                if (!prof) return false;

                updateProfessorItem(profId, 'status', 'generating');
                updateProfessorItem(profId, 'error', null);

                let promptText = `
                    You are an expert academic career advisor. Please write a highly professional, polite, and persuasive cold email for a prospective Master's student reaching out to a professor at KAIST for research opportunities.
                    
                    Details to include:
                    - Professor's Name: ${prof.profName}
                    - Professor's Research Area / Lab: ${prof.researchArea || 'Computer Science / Engineering'}
                    - Student's Name: ${userProfile.yourName}
                    - Student's Background: ${userProfile.yourBackground}
                `;

                if (prof.customPrompt && prof.customPrompt.trim() !== '') {
                    promptText += `\n\nCRITICAL PERSONALIZATION INSTRUCTIONS (Follow these strictly):\n${prof.customPrompt}`;
                } else {
                    promptText += `\n\n- Specific Interest: Express genuine interest in their recent work and how it aligns with your background.`;
                }

                promptText += `
                    \n\nThe tone should be formal, enthusiastic, and concise. Write it ready to send. Keep it to 3-4 short paragraphs.
                    Return the response strictly as a JSON object with two string fields: "subject" and "body".
                `;

                try {
                    const payload = {
                        contents: [{ parts: [{ text: promptText }] }],
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    subject: { type: "STRING" },
                                    body: { type: "STRING" }
                                },
                                required: ["subject", "body"]
                            }
                        }
                    };

                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiApiKey}`;
                    
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();
                    
                    if (!response.ok) throw new Error(result.error?.message || "API Error");
                    
                    if (result.candidates && result.candidates.length > 0) {
                        const parsedEmail = JSON.parse(result.candidates[0].content.parts[0].text);
                        setProfessors(prev => prev.map(p => 
                            p.id === profId ? { ...p, subject: parsedEmail.subject, body: parsedEmail.body, status: 'drafted' } : p
                        ));
                        return true;
                    } else {
                        throw new Error("Invalid format from AI.");
                    }
                } catch (err) {
                    console.error(err);
                    setProfessors(prev => prev.map(p => 
                        p.id === profId ? { ...p, status: 'error', error: err.message } : p
                    ));
                    return false;
                }
            };

            const sendSingleEmail = async (profId) => {
                const prof = professors.find(p => p.id === profId);
                if (!prof || !prof.subject || !prof.body) return;

                if (!accessToken) {
                    const mailtoLink = `mailto:${prof.profEmail}?subject=${encodeURIComponent(prof.subject)}&body=${encodeURIComponent(prof.body)}`;
                    window.open(mailtoLink, '_blank');
                    if (globalAttachments.length > 0) {
                        showNotification("Opened in email client. Remember to attach your files manually!", "info");
                    }
                    return;
                }

                updateProfessorItem(profId, 'status', 'sending');
                updateProfessorItem(profId, 'error', null);

                try {
                    // Utility to encode text to Base64 (handles UTF-8 chars correctly)
                    const encodeToBase64 = (str) => btoa(unescape(encodeURIComponent(str)));
                    
                    // RFC 1342 encoding for Subject line to support special characters
                    const safeSubject = `=?utf-8?B?${encodeToBase64(prof.subject)}?=`;
                    const base64Body = encodeToBase64(prof.body);
                    
                    let rawEmail = '';

                    // Construct Multi-part MIME if attachment exists
                    if (globalAttachments.length > 0) {
                        const boundary = 'kaist_mail_merge_boundary_' + Date.now().toString(16);
                        
                        rawEmail = 
                            `To: ${prof.profEmail}\r\n` +
                            `Subject: ${safeSubject}\r\n` +
                            `Content-Type: multipart/mixed; boundary="${boundary}"\r\n\r\n` +
                            `--${boundary}\r\n` +
                            `Content-Type: text/plain; charset="UTF-8"\r\n` +
                            `Content-Transfer-Encoding: base64\r\n\r\n` +
                            `${base64Body}\r\n\r\n`;

                        globalAttachments.forEach(attachment => {
                            rawEmail += 
                                `--${boundary}\r\n` +
                                `Content-Type: ${attachment.type}; name="${attachment.name}"\r\n` +
                                `Content-Disposition: attachment; filename="${attachment.name}"\r\n` +
                                `Content-Transfer-Encoding: base64\r\n\r\n` +
                                `${attachment.data}\r\n\r\n`;
                        });

                        rawEmail += `--${boundary}--`;
                    } else {
                        // Standard text/plain for no attachment
                        rawEmail = 
                            `To: ${prof.profEmail}\r\n` +
                            `Subject: ${safeSubject}\r\n` +
                            `Content-Type: text/plain; charset="UTF-8"\r\n` +
                            `Content-Transfer-Encoding: base64\r\n\r\n` +
                            `${base64Body}`;
                    }

                    // Convert entire raw email to URL-safe Base64 for Gmail API
                    const finalEncoded = btoa(rawEmail)
                        .replace(/\+/g, '-')
                        .replace(/\//g, '_')
                        .replace(/=+$/, '');

                    const response = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ raw: finalEncoded })
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || 'Send failed');
                    }

                    updateProfessorItem(profId, 'status', 'sent');
                } catch (err) {
                    console.error(err);
                    setProfessors(prev => prev.map(p => 
                        p.id === profId ? { ...p, status: 'drafted', error: 'Failed to send: ' + err.message } : p
                    ));
                }
            };

            const generateAllDrafts = async () => {
                const pending = professors.filter(p => p.status === 'pending' || p.status === 'error');
                if (pending.length === 0) return showNotification("No pending professors to generate drafts for.", "info");
                
                showNotification(`Starting generation for ${pending.length} drafts...`, "info");
                
                for (let i = 0; i < pending.length; i++) {
                    await generateSingleDraft(pending[i].id);
                    // 5 second delay between generations to respect Gemini API rate limits on Free Tier
                    if (i < pending.length - 1) await new Promise(r => setTimeout(r, 5000)); 
                }
            };

            const sendAllDrafts = async () => {
                if (!accessToken) {
                    return showNotification("You must Connect Gmail first to bulk send emails.", "error");
                }
                
                const drafted = professors.filter(p => p.status === 'drafted');
                if (drafted.length === 0) return showNotification("No ready drafts to send.", "info");

                if (!window.confirm(`Are you sure you want to send ${drafted.length} emails right now?`)) return;

                showNotification(`Sending ${drafted.length} emails...`, "info");

                for (let i = 0; i < drafted.length; i++) {
                    await sendSingleEmail(drafted[i].id);
                    if (i < drafted.length - 1) await new Promise(r => setTimeout(r, 1500));
                }
                
                showNotification("Bulk sending complete!", "success");
            };

            const showNotification = (message, type = 'info') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 4000);
            };

            return (
                <div className="min-h-screen bg-gray-100 p-4 md:p-8">
                    {/* Header */}
                    <div className="max-w-7xl mx-auto mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 kaist-blue rounded-lg flex items-center justify-center text-white text-2xl font-bold shadow-lg">
                                K
                            </div>
                            <div>
                                <h1 className="text-3xl font-bold kaist-text">KAIST Mail Merge</h1>
                                <p className="text-gray-600 text-sm mt-1">Automated Cold Outreach for Research Opportunities</p>
                            </div>
                        </div>
                        
                        <div className="flex gap-2">
                            <button 
                                onClick={() => setShowSettings(!showSettings)} 
                                className="bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200 text-gray-700 hover:text-blue-600 transition text-sm font-medium"
                            >
                                <i className="fas fa-cog"></i> API Settings
                            </button>
                            
                            <div className="bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200 flex items-center gap-3">
                                {accessToken ? (
                                    <>
                                        <div className="flex items-center gap-2 text-green-600 text-sm font-medium">
                                            <i className="fas fa-check-circle"></i> Gmail Connected
                                        </div>
                                        <button onClick={handleGmailLogout} className="text-xs text-gray-500 hover:text-red-500 transition border-l pl-3 ml-1">
                                            Disconnect
                                        </button>
                                    </>
                                ) : (
                                    <button onClick={handleGmailLogin} className="flex items-center gap-2 text-sm text-gray-700 hover:text-blue-600 transition font-medium">
                                        <i className="fab fa-google text-red-500"></i> Connect Gmail
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Security Settings Panel */}
                    {showSettings && (
                        <div className="max-w-7xl mx-auto mb-8 bg-blue-50 border border-blue-200 rounded-xl p-6 shadow-sm">
                            <div className="flex justify-between items-start mb-4">
                                <div>
                                    <h3 className="text-lg font-bold text-blue-900"><i className="fas fa-shield-alt mr-2"></i> Security & API Configuration</h3>
                                    <p className="text-sm text-blue-700 mt-1">Keys are saved securely in your browser's local storage.</p>
                                </div>
                                <button onClick={() => setShowSettings(false)} className="text-blue-400 hover:text-blue-800">
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="bg-white p-4 rounded-lg border border-blue-100">
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Gemini API Key (Draft Generation)</label>
                                    <input 
                                        type="password" 
                                        value={tempGeminiKey} 
                                        onChange={(e) => setTempGeminiKey(e.target.value)} 
                                        placeholder="AIzaSy..." 
                                        className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                                    />
                                </div>

                                <div className="bg-white p-4 rounded-lg border border-blue-100">
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Google Client ID (Automated Sending)</label>
                                    <input 
                                        type="text" 
                                        value={tempClientId} 
                                        onChange={(e) => setTempClientId(e.target.value)} 
                                        placeholder="...apps.googleusercontent.com" 
                                        className="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                                    />
                                </div>
                            </div>

                            <div className="mt-4 flex justify-end">
                                <button onClick={saveSettings} className="kaist-blue text-white px-6 py-2 rounded-md hover:bg-blue-800 transition font-medium">
                                    Save Configurations
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Notification Toast */}
                    {notification && (
                        <div className={`fixed top-4 right-4 text-white px-6 py-3 rounded-md shadow-lg z-50 flex items-center gap-2 animate-fade-in-down ${notification.type === 'error' ? 'bg-red-500' : notification.type === 'success' ? 'bg-green-500' : 'bg-blue-500'}`}>
                            <i className={`fas ${notification.type === 'error' ? 'fa-exclamation-circle' : notification.type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}`}></i> 
                            {notification.message}
                        </div>
                    )}

                    <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                        
                        {/* LEFT COLUMN: Data Entry */}
                        <div className="lg:col-span-4 space-y-6">
                            
                            {/* Persistent Profile & Attachment */}
                            <div className="bg-white rounded-xl shadow-md p-6 border border-gray-200">
                                <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <i className="fas fa-user-circle text-blue-600"></i> My Profile
                                </h2>
                                <p className="text-xs text-gray-500 mb-4 border-b pb-2">Your text details are saved automatically.</p>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
                                        <input type="text" name="yourName" value={userProfile.yourName} onChange={handleProfileChange} placeholder="e.g., Jane Doe" className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none transition text-sm" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Your Background</label>
                                        <textarea name="yourBackground" value={userProfile.yourBackground} onChange={handleProfileChange} placeholder="e.g., B.S. in Computer Science at XYZ Univ with a 3.9 GPA..." className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none transition text-sm h-24 resize-none"></textarea>
                                    </div>
                                </div>

                                {/* Attachments Section */}
                                <div className="mt-5 pt-5 border-t border-gray-100">
                                    <h3 className="text-sm font-bold text-gray-700 mb-2 flex items-center gap-2">
                                        <i className="fas fa-paperclip text-gray-500"></i> Global Attachments
                                    </h3>
                                    <p className="text-xs text-gray-500 mb-3">Attach Resume/CV/Transcripts (PDF preferred) to send with all automated emails. Resets on reload.</p>
                                    
                                    <div className="space-y-2 mb-3">
                                        {globalAttachments.map(attachment => (
                                            <div key={attachment.id} className="flex items-center justify-between bg-blue-50 border border-blue-200 rounded-md p-2">
                                                <div className="flex items-center gap-2 overflow-hidden">
                                                    <i className="fas fa-file-pdf text-red-500 text-lg"></i>
                                                    <span className="text-sm font-medium text-gray-700 truncate" title={attachment.name}>{attachment.name}</span>
                                                </div>
                                                <button onClick={() => removeAttachment(attachment.id)} className="text-gray-400 hover:text-red-500 transition px-2">
                                                    <i className="fas fa-times"></i>
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <label className="flex justify-center items-center px-4 py-3 bg-gray-50 border-2 border-dashed border-gray-300 rounded-md cursor-pointer hover:bg-gray-100 transition">
                                        <div className="flex flex-col items-center gap-1 text-sm text-gray-600 font-medium">
                                            <i className="fas fa-upload text-gray-400 text-lg mb-1"></i>
                                            {globalAttachments.length > 0 ? "Add Another File" : "Upload Documents (PDF, DOCX)"}
                                        </div>
                                        <input type="file" multiple className="hidden" accept=".pdf,.doc,.docx" onChange={handleFileUpload} />
                                    </label>
                                </div>
                            </div>

                            {/* Add Professor Form */}
                            <div className="bg-white rounded-xl shadow-md p-6 border border-gray-200">
                                <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <i className="fas fa-user-plus text-blue-600"></i> Add to Queue
                                </h2>
                                
                                <form onSubmit={handleAddProfessor} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Professor Name *</label>
                                        <input required type="text" name="profName" value={profForm.profName} onChange={handleProfFormChange} placeholder="e.g., Dr. Jong Chul Ye" className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none text-sm" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Email Address *</label>
                                        <input required type="email" name="profEmail" value={profForm.profEmail} onChange={handleProfFormChange} placeholder="professor@kaist.ac.kr" className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none text-sm" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Research Area</label>
                                        <input type="text" name="researchArea" value={profForm.researchArea} onChange={handleProfFormChange} placeholder="e.g., AI / Bio-Imaging" className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none text-sm" />
                                    </div>
                                    
                                    <button type="submit" className="w-full py-2.5 px-4 mt-2 rounded-md text-white font-medium bg-gray-800 hover:bg-black transition text-sm flex items-center justify-center gap-2">
                                        <i className="fas fa-plus"></i> Add to Queue
                                    </button>
                                </form>
                            </div>
                        </div>

                        {/* RIGHT COLUMN: Professor Queue */}
                        <div className="lg:col-span-8 flex flex-col h-[calc(100vh-12rem)] min-h-[600px]">
                            <div className="bg-white rounded-xl shadow-md border border-gray-200 flex flex-col h-full overflow-hidden">
                                
                                {}
                                <div className="p-5 border-b border-gray-200 bg-gray-50 flex flex-col sm:flex-row justify-between items-center gap-4">
                                    <div>
                                        <h2 className="text-xl font-semibold text-gray-800">Mailing List ({professors.length})</h2>
                                        <p className="text-xs text-gray-500">Review, prompt, and send your emails.</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={generateAllDrafts}
                                            className="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-md hover:bg-gray-100 transition text-sm font-medium shadow-sm flex items-center gap-2"
                                        >
                                            <i className="fas fa-magic text-blue-500"></i> Generate All
                                        </button>
                                        <button 
                                            onClick={sendAllDrafts}
                                            className={`px-4 py-2 rounded-md text-white transition text-sm font-medium shadow-sm flex items-center gap-2 ${accessToken ? 'bg-red-600 hover:bg-red-700' : 'bg-gray-400 cursor-not-allowed'}`}
                                            title={!accessToken ? "Connect Gmail to enable bulk sending" : ""}
                                        >
                                            <i className="fas fa-paper-plane"></i> Send Ready
                                        </button>
                                    </div>
                                </div>

                                {}
                                <div className="flex-grow overflow-y-auto p-5 space-y-4 custom-scrollbar bg-gray-100/50">
                                    {professors.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-gray-400">
                                            <i className="fas fa-inbox text-5xl mb-4 text-gray-300"></i>
                                            <p className="text-lg font-medium text-gray-500">Queue is empty</p>
                                            <p className="text-sm">Add professors using the form on the left.</p>
                                        </div>
                                    ) : (
                                        professors.map((prof) => (
                                            <div key={prof.id} className={`bg-white border rounded-lg overflow-hidden shadow-sm transition-all ${prof.status === 'sent' ? 'border-green-300' : 'border-gray-200'}`}>
                                                
                                                {/* Card Header Summary */}
                                                <div className="p-4 flex flex-col sm:flex-row justify-between sm:items-start gap-3 bg-white">
                                                    <div>
                                                        <h3 className="font-bold text-gray-800 text-lg">{prof.profName}</h3>
                                                        <p className="text-sm text-gray-500 flex items-center gap-2">
                                                            <i className="far fa-envelope"></i> {prof.profEmail}
                                                            {prof.researchArea && <span className="text-xs bg-gray-100 px-2 py-0.5 rounded-full ml-2 border border-gray-200">{prof.researchArea}</span>}
                                                        </p>
                                                    </div>
                                                    
                                                    <div className="flex flex-col items-end gap-2">
                                                        {/* Status Badge */}
                                                        {prof.status === 'pending' && <span className="text-xs font-semibold px-2.5 py-1 rounded-full bg-gray-100 text-gray-600 border border-gray-200">Pending Draft</span>}
                                                        {prof.status === 'generating' && <span className="text-xs font-semibold px-2.5 py-1 rounded-full bg-blue-50 text-blue-600 border border-blue-200 flex items-center gap-1"><div className="loader border-blue-600 border-t-transparent !w-3 !h-3 !border-2"></div> Generating</span>}
                                                        {prof.status === 'drafted' && <span className="text-xs font-semibold px-2.5 py-1 rounded-full bg-yellow-50 text-yellow-700 border border-yellow-200">Draft Ready</span>}
                                                        {prof.status === 'sending' && <span className="text-xs font-semibold px-2.5 py-1 rounded-full bg-orange-50 text-orange-600 border border-orange-200 flex items-center gap-1"><div className="loader border-orange-600 border-t-transparent !w-3 !h-3 !border-2"></div> Sending</span>}
                                                        {prof.status === 'sent' && <span className="text-xs font-semibold px-2.5 py-1 rounded-full bg-green-50 text-green-700 border border-green-200"><i className="fas fa-check"></i> Sent</span>}
                                                        {prof.status === 'error' && <span className="text-xs font-semibold px-2.5 py-1 rounded-full bg-red-50 text-red-600 border border-red-200" title={prof.error}>Error</span>}
                                                        
                                                        {/* Actions */}
                                                        <div className="flex bg-gray-50 rounded-lg border border-gray-200 p-1">
                                                            {(prof.status === 'pending' || prof.status === 'error' || prof.status === 'drafted') && (
                                                                <button onClick={() => generateSingleDraft(prof.id)} className="p-1.5 text-gray-500 hover:text-blue-600 rounded transition" title="Generate/Regenerate Draft">
                                                                    <i className="fas fa-magic"></i>
                                                                </button>
                                                            )}
                                                            {prof.status === 'drafted' && (
                                                                <button onClick={() => sendSingleEmail(prof.id)} className="p-1.5 text-gray-500 hover:text-red-600 rounded transition" title="Send Email">
                                                                    <i className="fas fa-paper-plane"></i>
                                                                </button>
                                                            )}
                                                            <div className="w-px bg-gray-300 mx-1"></div>
                                                            <button onClick={() => removeProfessor(prof.id)} className="p-1.5 text-gray-400 hover:text-gray-800 rounded transition" title="Remove from list">
                                                                <i className="fas fa-trash-alt"></i>
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* Error Message */}
                                                {prof.error && (
                                                    <div className="px-4 py-2 bg-red-50 text-red-600 text-xs border-t border-red-100 flex items-center gap-2">
                                                        <i className="fas fa-exclamation-triangle"></i> {prof.error}
                                                    </div>
                                                )}

                                                {}
                                                <div className="px-4 py-3 bg-blue-50/50 border-t border-gray-100">
                                                    <label className="block text-xs font-bold text-blue-800 uppercase tracking-wider mb-1 flex items-center gap-1">
                                                        <i className="fas fa-robot"></i> Custom AI Instructions
                                                    </label>
                                                    <div className="flex gap-2">
                                                        <input 
                                                            type="text" 
                                                            value={prof.customPrompt || ''} 
                                                            onChange={(e) => updateProfessorItem(prof.id, 'customPrompt', e.target.value)}
                                                            placeholder="e.g., Mention I read your 2023 paper on CNNs and loved the approach..."
                                                            className="w-full px-3 py-1.5 bg-white border border-blue-200 rounded-md text-gray-700 outline-none focus:border-blue-400 transition text-sm"
                                                        />
                                                        {prof.status === 'drafted' && (
                                                            <button 
                                                                onClick={() => generateSingleDraft(prof.id)} 
                                                                className="px-3 py-1.5 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded-md text-xs font-semibold transition flex items-center gap-1 whitespace-nowrap"
                                                            >
                                                                <i className="fas fa-sync-alt"></i> Regenerate
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>

                                                {}
                                                {(prof.subject || prof.body) && (
                                                    <div className="border-t border-gray-200 bg-gray-50 p-4 space-y-3">
                                                        <div>
                                                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Subject</label>
                                                            <input 
                                                                type="text" 
                                                                value={prof.subject} 
                                                                onChange={(e) => updateProfessorItem(prof.id, 'subject', e.target.value)}
                                                                disabled={prof.status === 'sending' || prof.status === 'sent'}
                                                                className="w-full px-3 py-2 bg-white border border-gray-300 rounded-md font-medium text-gray-800 outline-none focus:border-blue-400 transition text-sm disabled:bg-gray-100" 
                                                            />
                                                        </div>
                                                        <div>
                                                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Message Body</label>
                                                            <textarea 
                                                                value={prof.body} 
                                                                onChange={(e) => updateProfessorItem(prof.id, 'body', e.target.value)}
                                                                disabled={prof.status === 'sending' || prof.status === 'sent'}
                                                                className="w-full p-3 bg-white border border-gray-300 rounded-md text-gray-700 leading-relaxed outline-none focus:border-blue-400 transition text-sm resize-none min-h-[150px] disabled:bg-gray-100"
                                                            ></textarea>
                                                        </div>
                                                        {globalAttachments.length > 0 && (
                                                            <div className="text-xs text-green-600 font-medium flex items-center gap-1">
                                                                <i className="fas fa-paperclip"></i> {globalAttachments.length} file(s) will be attached automatically.
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
